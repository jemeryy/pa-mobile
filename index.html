<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#191919" media="(prefers-color-scheme: dark)">
<title>PA Mobile</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg: #ffffff; --surface: #f7f7f5; --surface2: #efefed;
    --ink: #1f1f1e; --muted: #6f6e69; --line: #e9e9e7;
    --accent: #2383e2; --accent-soft: #e7f0fa; --accent-ink: #ffffff;
    --danger: #d44c47; --ok: #448361;
    --shadow: 0 1px 2px rgba(0,0,0,.05);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #191919; --surface: #202020; --surface2: #2a2a28;
      --ink: #e8e8e6; --muted: #a3a29d; --line: #2e2e2c;
      --accent: #4f9fe0; --accent-soft: #1d2b38; --accent-ink: #0e1116;
      --shadow: none;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--ink); min-height: 100%;
    font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-text-size-adjust: 100%;
  }
  button { font: inherit; cursor: pointer; }
  a { color: var(--accent); text-decoration: none; }

  /* ---------- shell ---------- */
  header {
    position: sticky; top: 0; z-index: 30; background: var(--bg);
    display: flex; align-items: center; gap: 4px; padding: 10px 12px;
    border-bottom: 1px solid var(--line); min-height: 52px;
  }
  header .title { font-weight: 650; flex: 1; font-size: 16px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 4px; }
  .iconbtn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 38px; height: 38px; border: none; background: none; color: var(--ink);
    border-radius: 8px; flex-shrink: 0; transition: background .15s ease-out;
  }
  .iconbtn:active { background: var(--surface2); }
  .iconbtn svg { width: 21px; height: 21px; }
  .txtbtn {
    border: none; background: none; color: var(--accent); font-weight: 600;
    font-size: 15px; padding: 8px 10px; border-radius: 8px; flex-shrink: 0;
  }
  .txtbtn:active { background: var(--accent-soft); }

  main { max-width: 720px; margin: 0 auto; padding: 16px;
    padding-bottom: calc(84px + env(safe-area-inset-bottom)); }

  nav#tabbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
    display: flex; background: var(--bg); border-top: 1px solid var(--line);
    padding-bottom: env(safe-area-inset-bottom);
  }
  #tabbar a {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 8px 0 6px; color: var(--muted); font-size: 11px; font-weight: 550;
  }
  #tabbar a svg { width: 23px; height: 23px; }
  #tabbar a.on { color: var(--accent); }

  /* ---------- shared bits ---------- */
  .card { background: var(--surface); border: 1px solid var(--line);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .rowlist { border: 1px solid var(--line); border-radius: 12px; overflow: hidden;
    background: var(--bg); box-shadow: var(--shadow); }
  .rowlist > * { display: flex; align-items: center; gap: 12px; width: 100%;
    padding: 13px 14px; border: none; border-bottom: 1px solid var(--line);
    background: none; color: var(--ink); font-size: 15.5px; font-weight: 500;
    text-align: left; transition: background .15s ease-out; }
  .rowlist > *:last-child { border-bottom: none; }
  .rowlist > *:active { background: var(--surface); }
  .rowlist .ric { font-size: 19px; width: 26px; text-align: center; flex-shrink: 0; }
  .rowlist .rtx { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rowlist .chev { color: var(--muted); flex-shrink: 0; opacity: .6; }
  .sect { font-size: 13px; font-weight: 650; color: var(--muted);
    margin: 22px 4px 8px; }
  .muted { color: var(--muted); font-size: 14px; }
  .err { color: var(--danger); font-size: 14px; }
  .empty { text-align: center; color: var(--muted); padding: 36px 20px; font-size: 14.5px; }
  .primary {
    background: var(--accent); color: var(--accent-ink); border: none;
    border-radius: 8px; padding: 9px 18px; font-weight: 600; font-size: 15px;
  }
  .ghost { background: none; border: 1px solid var(--line); color: var(--ink);
    border-radius: 8px; padding: 9px 16px; font-weight: 550; font-size: 15px; }
  .ghost.danger { color: var(--danger); }
  input[type=text], input[type=password], input[type=date], input[type=time], textarea {
    width: 100%; padding: 10px 12px; border-radius: 8px; font-size: 16px;
    border: 1px solid var(--line); background: var(--bg); color: var(--ink);
  }
  input:focus-visible, textarea:focus-visible, button:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 1px;
  }
  textarea { resize: none; line-height: 1.55; font-family: inherit; }
  .skel { border-radius: 10px; background: var(--surface2); height: 46px;
    margin-bottom: 8px; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: .55; } }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
  .toast { position: fixed; bottom: calc(76px + env(safe-area-inset-bottom));
    left: 50%; transform: translateX(-50%); z-index: 60;
    background: var(--ink); color: var(--bg); padding: 9px 18px; border-radius: 20px;
    font-size: 13.5px; opacity: 0; transition: opacity .2s ease-out; pointer-events: none;
    max-width: 86vw; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .toast.show { opacity: 1; }

  /* ---------- home ---------- */
  .greet { font-size: 24px; font-weight: 700; margin: 6px 4px 2px; letter-spacing: -.01em; }
  .gdate { color: var(--muted); font-size: 14px; margin: 0 4px 18px; }
  .today .tev { display: flex; gap: 10px; padding: 5px 0; font-size: 14.5px; align-items: baseline; }
  .today .tev .tt { color: var(--muted); font-variant-numeric: tabular-nums;
    flex-shrink: 0; width: 74px; font-size: 13px; }
  .today .thead { display: flex; align-items: center; gap: 8px; font-weight: 650;
    font-size: 14px; margin-bottom: 6px; }
  .today .thead svg { width: 17px; height: 17px; color: var(--accent); }
  .tasksum { border-top: 1px solid var(--line); margin-top: 10px; padding-top: 10px;
    font-size: 14.5px; }

  /* ---------- document (block editor) ---------- */
  #doc .blk { border-radius: 8px; padding: 2px 8px; margin: 0 -8px; position: relative;
    transition: background .15s ease-out; }
  #doc .blk:active:not(.editing) { background: var(--surface); }
  #doc h1 { font-size: 25px; line-height: 1.25; margin: 18px 0 6px; letter-spacing: -.01em; }
  #doc h2 { font-size: 20px; margin: 22px 0 4px; }
  #doc h3 { font-size: 17px; margin: 18px 0 2px; }
  #doc p { margin: 8px 0; }
  #doc img { max-width: 100%; border-radius: 8px; }
  #doc pre { background: var(--surface); border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 12px; overflow-x: auto; font-size: 13px; }
  #doc code { background: var(--surface2); padding: 1px 5px; border-radius: 5px; font-size: 13.5px;
    font-family: ui-monospace, Menlo, Consolas, monospace; }
  #doc pre code { background: none; padding: 0; }
  #doc table { border-collapse: collapse; display: block; overflow-x: auto; margin: 8px 0; }
  #doc th, #doc td { border: 1px solid var(--line); padding: 6px 10px; font-size: 14px; }
  #doc blockquote { margin: 8px 0; padding: 2px 0 2px 12px;
    border-left: 3px solid var(--line); color: var(--muted); }
  #doc ul, #doc ol { margin: 0; padding-left: 26px; }
  #doc li { margin: 4px 0; }
  #doc li::marker { color: var(--muted); }
  #doc ul.cklist { list-style: none; padding-left: 2px; }
  #doc input[type=checkbox] { width: 19px; height: 19px; margin: 0 8px 0 0;
    vertical-align: -4px; accent-color: var(--accent); }
  #doc li.done { color: var(--muted); text-decoration: line-through;
    text-decoration-color: color-mix(in srgb, var(--muted) 50%, transparent); }
  #doc .additem { display: flex; align-items: center; gap: 8px; color: var(--muted);
    background: none; border: none; padding: 6px 8px; font-size: 14px; margin-left: -6px;
    opacity: .75; }
  #doc .additem svg { width: 16px; height: 16px; }
  .blkedit textarea { min-height: 44px; }
  .blkedit .ebar { display: flex; gap: 8px; margin: 8px 0 6px; align-items: center; }
  .blkedit .ebar .sp { flex: 1; }
  .addblock { display: flex; align-items: center; gap: 8px; color: var(--muted);
    background: none; border: none; padding: 10px 8px; font-size: 14.5px; margin-top: 10px; }
  .addblock svg { width: 18px; height: 18px; }

  /* ---------- udemy script view ---------- */
  .u-tot { position: sticky; top: 53px; z-index: 20; background: var(--bg);
    padding: 8px 4px; font-size: 13px; color: var(--muted); border-bottom: 1px solid var(--line);
    font-variant-numeric: tabular-nums; display: flex; gap: 6px; align-items: center; }
  .u-tot b { color: var(--ink); }
  .u-blk { padding: 16px 0; border-bottom: 1px solid var(--line); }
  .u-mark { display: inline-block; font: 12px ui-monospace, Menlo, Consolas, monospace;
    background: var(--surface2); border-radius: 5px; padding: 3px 9px; color: var(--muted); }
  .u-mark.demo { color: var(--accent); background: var(--accent-soft); }
  .u-stats { font-size: 12px; color: var(--muted); margin-left: 8px;
    font-variant-numeric: tabular-nums; }
  .u-lbl { font-size: 11px; letter-spacing: .07em; text-transform: uppercase;
    color: var(--muted); font-weight: 650; margin: 12px 0 4px; }
  .u-lbl.anim { color: var(--accent); }
  .u-blk textarea { font-size: 15px; }
  .u-blk textarea.mono { font: 13px/1.5 ui-monospace, Menlo, Consolas, monospace;
    color: var(--muted); }
  .u-cols { display: grid; grid-template-columns: minmax(280px, 420px) 1fr;
    gap: 0 20px; align-items: start; }
  @media (max-width: 780px) { .u-cols { grid-template-columns: 1fr; } }
  .board { aspect-ratio: 16/9; background: #17181b; color: #f2f2ef;
    border: 1px solid #2c2d31; border-radius: 8px; margin-top: 10px;
    padding: 5% 6%; display: flex; flex-direction: column; justify-content: center;
    overflow: hidden; line-height: 1.5;
    font-family: "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive;
    font-size: clamp(10px, 3vw, 14px); }
  .board .b-kicker { font-size: .68em; letter-spacing: .12em; text-transform: uppercase;
    color: #8f939b; margin-bottom: .9em; font-family: -apple-system, "Segoe UI", sans-serif; }
  .board .v-line { margin: .3em 0; }
  .board .v-line:nth-child(5n+2) { color: #f2f2ef; }
  .board .v-line:nth-child(5n+3) { color: #ffd166; }
  .board .v-line:nth-child(5n+4) { color: #7fd8c8; }
  .board .v-line:nth-child(5n)   { color: #ff9e7d; }
  .board .v-line:nth-child(5n+1) { color: #9ecbff; }
  .screen { aspect-ratio: 16/9; background: #23282c; color: #d7dde1; border-radius: 8px;
    margin-top: 10px; overflow: hidden; display: flex; flex-direction: column;
    font-size: clamp(9px, 2.8vw, 13px); }
  .screen .chrome { background: #31383d; padding: .5em .9em; font-size: .8em; color: #9aa5ac;
    display: flex; gap: .5em; align-items: center; flex-shrink: 0; }
  .screen .chrome i { width: .7em; height: .7em; border-radius: 50%; background: #57646c; }
  .screen .body { padding: .9em 1.1em; overflow: hidden; line-height: 1.5; }
  .u-prose { padding: 10px 0; }
  .u-prose summary { color: var(--muted); font-size: 13px; font-weight: 600; padding: 4px 0; }
  .savebar { position: fixed; left: 0; right: 0; z-index: 40;
    bottom: calc(52px + env(safe-area-inset-bottom));
    background: var(--bg); border-top: 1px solid var(--line);
    display: flex; align-items: center; gap: 12px; padding: 10px 16px; }
  .savebar .msg { flex: 1; font-size: 13.5px; color: var(--muted); }
  .banner { background: var(--accent-soft); border: 1px solid var(--accent);
    border-radius: 10px; padding: 12px 14px; font-size: 14px; margin-bottom: 14px; }
  .banner .brow { display: flex; gap: 10px; margin-top: 10px; }

  /* ---------- calendar / tasks ---------- */
  .dayhead { font-size: 14px; font-weight: 650; margin: 20px 4px 6px; }
  .dayhead small { color: var(--muted); font-weight: 500; margin-left: 6px; }
  .dayhead.today { color: var(--accent); }
  .ev { display: flex; gap: 12px; padding: 11px 14px; align-items: baseline; }
  .ev .et { width: 76px; flex-shrink: 0; color: var(--muted); font-size: 13px;
    font-variant-numeric: tabular-nums; line-height: 1.4; }
  .ev .es { flex: 1; font-weight: 500; font-size: 15px; }
  .ev .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    flex-shrink: 0; align-self: center; }
  .task { display: flex; gap: 12px; padding: 12px 14px; align-items: flex-start;
    transition: opacity .25s ease-out, transform .25s ease-out; }
  .task.gone { opacity: 0; transform: translateX(12px); }
  .task .tk { width: 21px; height: 21px; border-radius: 50%; border: 1.5px solid var(--muted);
    background: none; flex-shrink: 0; margin-top: 1px; padding: 0;
    display: inline-flex; align-items: center; justify-content: center; color: transparent; }
  .task .tk svg { width: 13px; height: 13px; }
  .task .tk:active { border-color: var(--accent); color: var(--accent); }
  .task .tbody { flex: 1; min-width: 0; }
  .task .ttl { font-size: 15px; font-weight: 500; overflow-wrap: anywhere; }
  .task .due { font-size: 12.5px; color: var(--muted); margin-top: 1px; }
  .task .due.over { color: var(--danger); font-weight: 600; }
  .task .tnotes { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .addform { display: flex; flex-direction: column; gap: 10px; }
  .addform .frow { display: flex; gap: 10px; align-items: center; }
  .addform .frow > * { flex: 1; }
  .addform .frow label { flex: 0 0 auto; font-size: 14px; color: var(--muted); }
  .chips { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 14px; padding: 2px; }
  .chips button { border: 1px solid var(--line); background: var(--surface); color: var(--ink);
    border-radius: 16px; padding: 6px 14px; font-size: 13.5px; font-weight: 550;
    white-space: nowrap; }
  .chips button.on { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .connect { text-align: center; padding: 26px 18px; }
  .connect p { margin: 0 0 14px; color: var(--muted); font-size: 14.5px; }

  /* ---------- month grid ---------- */
  .cal-chrome { display: flex; align-items: center; gap: 2px; margin: 2px 0 10px; }
  .cal-chrome .mtitle { flex: 1; font-size: 19px; font-weight: 700; letter-spacing: -.01em; padding-left: 4px; }
  .cal-chrome .txtbtn { padding: 6px 10px; }
  .cal-wk { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center;
    font-size: 11px; font-weight: 650; color: var(--muted); padding: 2px 0 6px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; touch-action: pan-y; }
  .cal-day { border: none; background: none; padding: 5px 0 4px; display: flex; flex-direction: column;
    align-items: center; gap: 3px; color: var(--ink); border-radius: 10px; min-height: 46px; }
  .cal-day:active { background: var(--surface); }
  .cal-day .dn { font-size: 14px; width: 28px; height: 28px; line-height: 28px; text-align: center;
    border-radius: 50%; font-variant-numeric: tabular-nums; }
  .cal-day.oth { color: var(--muted); opacity: .45; }
  .cal-day.today .dn { background: var(--accent); color: #fff; font-weight: 700; }
  .cal-day.sel { background: var(--surface); }
  .cal-day.sel:not(.today) .dn { box-shadow: inset 0 0 0 1.5px var(--accent); color: var(--accent); font-weight: 650; }
  .cal-day .dots { display: flex; gap: 3px; height: 5px; }
  .cal-day .dots i { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
  .cal-day.oth .dots i { background: var(--muted); }

  /* ---------- settings ---------- */
  .set .card h3 { margin: 0 0 4px; font-size: 15.5px; }
  .set .card p { margin: 4px 0 10px; color: var(--muted); font-size: 13.5px; }
  .set .stat { font-size: 13.5px; margin-top: 8px; }
  .set .stat.ok { color: var(--ok); }

  /* ---------- concept map (Aegis, embedded) ---------- */
  .mapview { position: fixed; top: 53px; left: 0; right: 0;
    bottom: calc(52px + env(safe-area-inset-bottom)); z-index: 1; background: var(--bg); }
  .mapview iframe { width: 100%; height: 100%; border: 0; display: block; }
</style>
</head>
<body>
<header>
  <button class="iconbtn" id="hback" style="display:none" aria-label="Back"></button>
  <div class="title" id="htitle">PA Mobile</div>
  <span id="hactions" style="display:flex"></span>
</header>
<main id="main"></main>
<nav id="tabbar"></nav>
<div class="toast" id="toast"></div>

<script>
'use strict';
/* =============== utilities =============== */
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const ICONS = {
  back: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>',
  home: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.8 12 3.5l9 7.3"/><path d="M5.5 9.5V20.5h13V9.5"/></svg>',
  cal: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3.5" y="5" width="17" height="16" rx="2.5"/><path d="M3.5 9.5h17M8 2.8V6M16 2.8V6"/></svg>',
  tasks: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8.3 12.3l2.5 2.5 4.9-5.4"/></svg>',
  gear: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.03 1.56V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1.11-1.56 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.56-1.03H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.56-1.11 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.08A1.7 1.7 0 0 0 10.1 3.1V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1.03 1.56 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.08c.26.63.87 1.05 1.56 1.06H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.51 1.05z"/></svg>',
  plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
  chev: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>',
  trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V4.8A.8.8 0 0 1 9.8 4h4.4a.8.8 0 0 1 .8.8V7m3 0v13a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V7"/></svg>',
  check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7.5"/></svg>',
};
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function toast(msg) {
  $('toast').textContent = msg; $('toast').classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(() => $('toast').classList.remove('show'), 2400);
}
function pad(n) { return String(n).padStart(2, '0'); }
function dkey(d) { return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()); }
function fmtTime(d) {
  let h = d.getHours(); const m = d.getMinutes(); const ap = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12; return h + (m ? ':' + pad(m) : '') + ap;
}
function dayLabel(d) {
  const t = new Date(); const tm = new Date(); tm.setDate(t.getDate()+1);

/* =============== GitHub layer =============== */
async function gh(path, opts = {}) {
  opts.headers = Object.assign({
    'Authorization': 'Bearer ' + token,
    'Accept': 'application/vnd.github+json',
  }, opts.headers || {});
  const r = await fetch(API + encodeURI(path).replace(/#/g, '%23') + '?ref=main&t=' + Date.now(), opts);
  if (r.status === 401) { localStorage.removeItem('pa_token'); token = ''; route(); throw new Error('GitHub token rejected'); }
  if (!r.ok && r.status !== 409) throw new Error('GitHub ' + r.status + ' on ' + path);
  return r;
}
function b64decode(b64) {
  const bin = atob(b64.replace(/\n/g, ''));
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}
function b64encode(text) {
  const bytes = new TextEncoder().encode(text);
  let bin = '';
  for (let i = 0; i < bytes.length; i += 8192)
    bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 8192));
  return btoa(bin);
}
async function ghGet(path) { return (await gh(path)).json(); }   // file obj or dir array
async function loadFile(path) {
  const j = await ghGet(path);
  return { path, sha: j.sha, text: b64decode(j.content) };
}
/* returns new sha, or null on conflict (409) */
async function saveFile(path, text, sha, msg) {
  const r = await gh(path, { method: 'PUT', body: JSON.stringify({
    message: msg || ('phone: edit ' + path), content: b64encode(text), sha, branch: 'main' }) });
  if (r.status === 409) return null;
  return (await r.json()).content.sha;
}

const UDEMY_RE = /^projects\/udemy-course\/scripts\/[^/]+\.md$/;
let leaveGuard = null;   // {check, dirty, hash} set by views with unsaved state
let viewCleanup = null;  // teardown a view registers (map poll timer, voice-dump mic) run on next route
let suppressRoute = false;
async function route() {
  if (suppressRoute) { suppressRoute = false; return; }
  if (leaveGuard && !leaveGuard.check()) {
    suppressRoute = true; location.hash = leaveGuard.hash; return;
  }
  leaveGuard = null;
  if (viewCleanup) { viewCleanup(); viewCleanup = null; }
  drawTabs();
  window.scrollTo(0, 0);
  if (!token && !DEMO) return tokenView();
  const h = decodeURIComponent(location.hash);
  try {
    if (h.startsWith('#/weekly')) return await openWeeklyPlan();
    if (h.startsWith('#/subject/')) return subjectView(h.slice(10));
    if (h.startsWith('#/lessons/')) return await lessonsView(h.slice(10));
    if (h.startsWith('#/lesson/')) return await lessonView(h.slice(9));
    if (h.startsWith('#/map/')) return await mapView(h.slice(6));
    if (h.startsWith('#/viz/')) return await lessonView(h.slice(6));   // viz reuse the self-contained-HTML renderer
    if (h.startsWith('#/raw/')) return await rawView(h.slice(6));
    if (h === '#/dump') return dumpView();
    if (h.startsWith('#/p/')) {
      const path = h.slice(4);
      if (UDEMY_RE.test(path)) return await udemyView(path);
      return await openPage(path);
    }
    if (h.startsWith('#/cal')) return await calView();
    if (h.startsWith('#/tasks')) return await tasksView();
    if (h.startsWith('#/settings')) return settingsView();
    return await homeView();
  } catch (e) { $('main').innerHTML = `<p class="err">${esc(e.message)}</p>`; }
}

/* =============== document view: block editing =============== */
const BLOCK_START = /^(#{1,6}\s|```|~~~|\s*(?:[-*+]|\d+[.)])\s|\s*>|\s*\|)/;
function parseBlocks(text) {
  const lines = text.split('\n');
  const blocks = [];
  const push = (s, e, type) => blocks.push({ start: s, end: e, type, src: lines.slice(s, e + 1).join('\n') });
  let i = 0;
  while (i < lines.length) {
    const l = lines[i];
    if (!l.trim()) { i++; continue; }
    if (/^(```|~~~)/.test(l)) {
      const fence = l.match(/^(```|~~~)/)[1];
      let j = i + 1;
      while (j < lines.length && !lines[j].startsWith(fence)) j++;
      push(i, Math.min(j, lines.length - 1), 'code'); i = j + 1; continue;
    }
    if (/^#{1,6}\s/.test(l)) { push(i, i, 'heading'); i++; continue; }
    if (/^(-{3,}|\*{3,}|_{3,})\s*$/.test(l)) { push(i, i, 'hr'); i++; continue; }
    if (/^\s*(?:[-*+]|\d+[.)])\s/.test(l)) {
      let j = i + 1;   // continuation lines: indented, not a new list item
      while (j < lines.length && /^\s{2,}\S/.test(lines[j]) && !/^\s*(?:[-*+]|\d+[.)])\s/.test(lines[j])) j++;
      push(i, j - 1, 'li'); i = j; continue;
    }
    if (/^\s*>/.test(l)) {
      let j = i + 1; while (j < lines.length && /^\s*>/.test(lines[j])) j++;
      push(i, j - 1, 'quote'); i = j; continue;
    }
    if (/^\s*\|/.test(l)) {
      let j = i + 1; while (j < lines.length && /^\s*\|/.test(lines[j])) j++;
      push(i, j - 1, 'table'); i = j; continue;
    }
    let j = i + 1;
    while (j < lines.length && lines[j].trim() && !BLOCK_START.test(lines[j])) j++;
    push(i, j - 1, 'p'); i = j;
  }
  return blocks;
}
/* split a list-item block into editable prefix ("- [ ] ") and text */
const LI_RE = /^(\s*(?:[-*+]|\d+[.)])\s+(?:\[( |x|X)\]\s+)?)([\s\S]*)$/;
function liParts(src) {
  const m = src.match(LI_RE);
  return m ? { prefix: m[1], boxed: m[2] !== undefined, text: m[3] } : { prefix: '', boxed: false, text: src };
}

async function openPage(path) {
  const j = await ghGet(path);
  if (Array.isArray(j)) return dirView(path, j);
  cur = { path, sha: j.sha, text: b64decode(j.content) };
  if (!path.endsWith('.md')) return rawView(path, true);
  docView(path);
}
function docView(path) {
  const actions = [{ label: 'Raw', fn: () => location.hash = '#/raw/' + encodeURIComponent(cur.path) }];
  if (WEEKLY_RE.test(path)) actions.unshift({ label: '↻ Cal', fn: refreshWeeklyCalendar });
  setHeader(path.split('/').pop().replace(/\.md$/, ''), { back: true, actions });
  $('main').innerHTML = '<div id="doc"></div>';
  renderDoc();
}
function renderDoc() {
  const doc = $('doc');
  if (!doc) return;
  const blocks = parseBlocks(cur.text);
  doc.innerHTML = '';
  let listWrap = null, listIndent = null;
  blocks.forEach((b, bi) => {
    const el = document.createElement('div');
    el.className = 'blk'; el.dataset.bi = bi;
    if (b.type === 'li') {
      const indent = b.src.match(/^\s*/)[0].length;
      if (!listWrap || indent !== listIndent) {
        if (listWrap) addListPlus(listWrap, blocks);
        listWrap = document.createElement('div'); listWrap.className = 'listrun';
        listWrap.style.marginLeft = (indent * 0.55) + 'em';
        listIndent = indent; doc.appendChild(listWrap);
      }
      el.innerHTML = marked.parse(b.src.replace(new RegExp('^\\s{0,' + listIndent + '}', 'gm'), ''), { gfm: true });
      styleTaskList(el, b);
      listWrap.appendChild(el);
      if (bi === blocks.length - 1) addListPlus(listWrap, blocks);
    } else {
      if (listWrap) { addListPlus(listWrap, blocks); listWrap = null; listIndent = null; }
      el.innerHTML = b.type === 'hr' ? '<hr style="border:none;border-top:1px solid var(--line);margin:18px 0">'
        : marked.parse(b.src, { gfm: true });
      doc.appendChild(el);
    }
    if (b.type !== 'li' && listWrap) { listWrap = null; listIndent = null; }
    el.addEventListener('click', ev => {
      if (ev.target.closest('input,button')) return;
      const a = ev.target.closest('a');
      if (a) { handleLink(ev, a); return; }
      startBlockEdit(el, bi);
    });
  });
  const add = document.createElement('button');
  add.className = 'addblock'; add.innerHTML = ICONS.plus + ' Add text';
  add.onclick = () => startBlockEdit(null, -1);
  doc.appendChild(add);
}
function addListPlus(wrap, blocks) {
  const lastEl = wrap.querySelector('.blk:last-of-type');
  if (!lastEl) return;
  const bi = +lastEl.dataset.bi;
  const b = blocks[bi];
  const p = liParts(b.src.split('\n')[0]);
  const btn = document.createElement('button');
  btn.className = 'additem'; btn.innerHTML = ICONS.plus + (p.boxed ? ' To-do' : ' Item');
  btn.onclick = () => insertListItem(bi, p);
  wrap.appendChild(btn);
}
function styleTaskList(el, b) {
  const box = el.querySelector('input[type=checkbox]');
  if (!box) return;
  el.querySelectorAll('ul').forEach(u => u.classList.add('cklist'));
  const li = el.querySelector('li');
  if (box.checked && li) li.classList.add('done');
  box.disabled = false;
  box.onchange = async () => {
    box.disabled = true;
    const src = b.src.replace(/\[( |x|X)\]/, m => m === '[ ]' ? '[x]' : '[ ]');
    const ok = await spliceSave(b, src, 'phone: toggle task in ' + cur.path);
    if (!ok) box.disabled = false;
  };
}
function handleLink(ev, a) {
  const href = a.getAttribute('href') || '';
  if (/^https?:/.test(href)) { a.target = '_blank'; a.rel = 'noopener'; return; }
  ev.preventDefault();
  if (href.startsWith('#')) return;
  const base = cur.path.split('/').slice(0, -1);
  const parts = href.split('/');
  for (const p of parts) {
    if (p === '..') base.pop(); else if (p !== '.') base.push(p);
  }
  location.hash = '#/p/' + encodeURIComponent(base.join('/').split('#')[0]);
}
/* replace block bi's lines with newSrc (null = delete), commit, re-render */
async function spliceSave(b, newSrc, msg, extraLine) {
  const lines = cur.text.split('\n');
  if (newSrc === null) lines.splice(b.start, b.end - b.start + 1);
  else if (extraLine) lines.splice(b.end + 1, 0, ...newSrc.split('\n'));   // insert AFTER block
  else lines.splice(b.start, b.end - b.start + 1, ...newSrc.split('\n'));
  const next = lines.join('\n');
  try {
    const sha = await saveFile(cur.path, next, cur.sha, msg);
    if (!sha) { toast('File changed elsewhere. Reloading.'); await reloadCur(); return false; }
    cur.text = next; cur.sha = sha;
    const y = window.scrollY; renderDoc(); window.scrollTo(0, y);
    return true;
  } catch (e) { toast('Save failed: ' + e.message); return false; }
}
async function reloadCur() {
  cur = await loadFile(cur.path);
  const y = window.scrollY; renderDoc(); window.scrollTo(0, y);
}
function startBlockEdit(el, bi) {
  document.querySelectorAll('.blkedit').forEach(x => x.remove());
  document.querySelectorAll('.blk.hidden-edit').forEach(x => { x.style.display = ''; x.classList.remove('hidden-edit'); });
  const blocks = parseBlocks(cur.text);
  const b = bi >= 0 ? blocks[bi] : null;
  let display = '', prefix = '', suffix = '';
  if (b) {
    if (b.type === 'heading') {
      const m = b.src.match(/^(#{1,6}\s+)([\s\S]*)$/); prefix = m[1]; display = m[2];
    } else if (b.type === 'li' && !b.src.includes('\n')) {
      const p = liParts(b.src); prefix = p.prefix; display = p.text;
    } else display = b.src;
  }
  const ed = document.createElement('div');
  ed.className = 'blkedit';
  ed.innerHTML = `<textarea id="bed"></textarea>
    <div class="ebar">
      <button class="primary" id="bsave">Save</button>
      <button class="ghost" id="bcancel">Cancel</button>
      <span class="sp"></span>
      ${b ? `<button class="iconbtn" id="bdel" aria-label="Delete" style="color:var(--danger)">${ICONS.trash}</button>` : ''}
    </div>`;
  if (el) { el.style.display = 'none'; el.classList.add('hidden-edit'); el.after(ed); }
  else $('doc').insertBefore(ed, $('doc').lastElementChild);
  const ta = ed.querySelector('#bed');
  ta.value = display;
  const fit = () => { ta.style.height = 'auto'; ta.style.height = (ta.scrollHeight + 2) + 'px'; };
  ta.addEventListener('input', fit); fit(); ta.focus();
  const close = () => { ed.remove(); if (el) { el.style.display = ''; el.classList.remove('hidden-edit'); } };
  ed.querySelector('#bcancel').onclick = close;
  ed.querySelector('#bsave').onclick = async () => {
    const v = ta.value.replace(/\s+$/, '');
    if (b) {
      if (!v.trim()) { await spliceSave(b, null, 'phone: delete block in ' + cur.path); return; }
      await spliceSave(b, prefix + v + suffix, 'phone: edit ' + cur.path);
    } else {
      if (!v.trim()) { close(); return; }
      const lines = cur.text.replace(/\s+$/, '');
      const next = (lines ? lines + '\n\n' : '') + v + '\n';
      try {
        const sha = await saveFile(cur.path, next, cur.sha, 'phone: add to ' + cur.path);
        if (!sha) { toast('File changed elsewhere. Reloading.'); await reloadCur(); return; }
        cur.text = next; cur.sha = sha; renderDoc();
        window.scrollTo(0, document.body.scrollHeight);
      } catch (e) { toast('Save failed: ' + e.message); }
    }
  };
  const del = ed.querySelector('#bdel');
  if (del) del.onclick = async () => { await spliceSave(b, null, 'phone: delete block in ' + cur.path); };
}
function insertListItem(bi, parts) {
  const blocks = parseBlocks(cur.text);
  const b = blocks[bi];
  const ed = document.createElement('div');
  ed.className = 'blkedit';
  ed.innerHTML = `<textarea id="ned" placeholder="New item"></textarea>
    <div class="ebar"><button class="primary" id="nsave">Add</button>
    <button class="ghost" id="ncancel">Cancel</button></div>`;
  const host = document.querySelector(`.blk[data-bi="${bi}"]`);
  host.parentElement.insertBefore(ed, host.nextSibling);
  const ta = ed.querySelector('#ned'); ta.focus();
  ed.querySelector('#ncancel').onclick = () => ed.remove();
  ed.querySelector('#nsave').onclick = async () => {
    const v = ta.value.trim(); if (!v) { ed.remove(); return; }
    let prefix = parts.prefix;
    const num = prefix.match(/^(\s*)(\d+)([.)])(\s+)/);
    if (num) prefix = num[1] + (parseInt(num[2]) + 1) + num[3] + num[4];
    if (parts.boxed) prefix = prefix.replace(/\[( |x|X)\]/, '[ ]');
    await spliceSave(b, prefix + v, 'phone: add item to ' + cur.path, true);
  };
}

/* =============== weekly plan ===============
   A weekly plan is just a markdown file at plans/weekly/YYYY-Www.md, so it views
   and edits with the normal block editor. The only extras: create this week's file
   from a template, and pull the real week's calendar into its "Fixed" section. */
const WEEKLY_RE = /^plans\/weekly\/\d{4}-W\d{2}\.md$/;
const WEEKLY_FIXED_HEAD = '## Fixed this week (from your calendar)';
function isoWeek(d) {
  const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = t.getUTCDay() || 7;                       // Mon=1..Sun=7
  t.setUTCDate(t.getUTCDate() + 4 - day);               // ISO: to Thursday of this week
  const yearStart = new Date(Date.UTC(t.getUTCFullYear(), 0, 1));
  const week = Math.ceil(((t - yearStart) / 86400000 + 1) / 7);
  return { year: t.getUTCFullYear(), week };
}
/* the Monday of the week we should be planning: on the weekend, plan the week ahead */
function planMonday(d) {
  const m = new Date(d); m.setHours(0, 0, 0, 0);
  const wd = m.getDay();                                // 0 Sun .. 6 Sat
  if (wd === 6) m.setDate(m.getDate() + 2);            // Sat -> next Mon
  else if (wd === 0) m.setDate(m.getDate() + 1);       // Sun -> next Mon
  else m.setDate(m.getDate() - (wd - 1));              // Mon..Fri -> this Mon
  return m;
}
function weekFilePath(mon) {
  const { year, week } = isoWeek(mon);
  return 'plans/weekly/' + year + '-W' + pad(week) + '.md';
}
function longDate(d) { return DAYS[d.getDay()] + ' ' + d.getDate() + ' ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear(); }
async function weekEventLines(mon, nextMon) {
  const evs = await gcalList(mon, nextMon);
  if (!evs.length) return ['_No events on your calendar this week._'];
  return evs
    .map(ev => ({ s: new Date(ev.start.dateTime || ev.start.date + 'T00:00:00'), timed: !!ev.start.dateTime, summary: ev.summary || '(no title)' }))
    .sort((a, b) => a.s - b.s)
    .map(e => '- ' + DAYS[e.s.getDay()] + ' ' + e.s.getDate() + ' ' + MONTHS[e.s.getMonth()]
      + (e.timed ? ', ' + fmtTime(e.s) : ', all day') + ' — ' + e.summary);
}
async function fixedSectionBody(mon, nextMon) {
  return ['_Tap the calendar button in the header to refresh. Plan your deep work around these._',
    ...(await weekEventLines(mon, nextMon))];
}
function weeklyTemplate(mon, fixedBody) {
  return [
    '# Weekly plan — week of ' + longDate(mon), '',
    '## Outcomes this week (pick 2-3)',
    '_The few things that actually move you toward your goals, not a to-do dump._',
    '- [ ] ', '- [ ] ', '',
    WEEKLY_FIXED_HEAD,
    ...fixedBody, '',
    '## Deep work at your energy peaks',
    '_Hardest, most important work at your daily peak; admin in the troughs._',
    '### Peak (your sharpest hours)', '- [ ] ',
    '### Middle', '- [ ] ',
    '### Trough (low energy / admin)', '- [ ] ', '',
    '## If-then scripts',
    '_Pre-decide your response to an obstacle you can already see coming._',
    '- If , then ', '',
    '## Recovery (schedule it, do not leave it to chance)',
    '- [ ] ', '',
    '_Keep focused work under ~50 hours; past that, output per hour drops. Method: Justin Sung (references/justin-sung-channel-takeaways-2026-07.md)._', ''
  ].join('\n');
}
/* rewrite the Fixed section body in place, keeping every other block untouched */
function replaceFixedSection(text, bodyLines) {
  const lines = text.split('\n');
  const start = lines.findIndex(l => /^##\s+Fixed this week/.test(l));
  if (start < 0) return null;
  let end = start + 1;
  while (end < lines.length && !/^##\s/.test(lines[end])) end++;
  return [...lines.slice(0, start + 1), '', ...bodyLines, '', ...lines.slice(end)]
    .join('\n').replace(/\n{3,}/g, '\n\n');
}
async function fileExists(path) {
  if (DEMO) return false;                               // demo: always build so the template + demo calendar show
  try { await ghGet(path); return true; }
  catch (e) { if (/\b404\b/.test(e.message)) return false; throw e; }
}
async function openWeeklyPlan() {
  setHeader('Weekly plan', { back: true });
  $('main').innerHTML = skels(3);
  const mon = planMonday(new Date());
  const nextMon = new Date(mon); nextMon.setDate(nextMon.getDate() + 7);
  const path = weekFilePath(mon);
  try {
    if (!(await fileExists(path))) {
      let body = null;
      if (gtokValid()) { try { body = await fixedSectionBody(mon, nextMon); } catch (_) {} }
      if (!body) body = ['_Connect Google in Settings, then use the calendar button to pull your week._'];
      const sha = await saveFile(path, weeklyTemplate(mon, body), undefined, 'phone: start weekly plan ' + path.split('/').pop());
      if (!sha) { $('main').innerHTML = '<p class="err">Could not create the weekly plan.</p>'; return; }
    }
  } catch (e) { $('main').innerHTML = `<p class="err">${esc(e.message)}</p>`; return; }
  location.replace(location.pathname + location.search + '#/p/' + encodeURIComponent(path));
}
/* header action on a weekly-plan page: pull the current week's events into Fixed */
async function refreshWeeklyCalendar() {
  if (!gtokValid()) { gAuth(refreshWeeklyCalendar); return; }   // sync from the tap, so the popup is allowed
  const mon = planMonday(new Date());
  const nextMon = new Date(mon); nextMon.setDate(nextMon.getDate() + 7);
  let body;
  try { body = await fixedSectionBody(mon, nextMon); } catch (e) { toast(e.message); return; }
  const next = replaceFixedSection(cur.text, body);
  if (next === null) { toast('No "Fixed this week" section to update'); return; }
  if (next === cur.text) { toast('Calendar already up to date'); return; }
  try {
    const sha = await saveFile(cur.path, next, cur.sha, 'phone: refresh weekly calendar');
    if (!sha) { toast('File changed elsewhere. Reloading.'); await reloadCur(); return; }
    cur.text = next; cur.sha = sha;
    const y = window.scrollY; renderDoc(); window.scrollTo(0, y);
    toast('Calendar updated');
  } catch (e) { toast('Save failed: ' + e.message); }
}

/* =============== voice dump (inflow) =============== */
let dumpRecog = null;  // active SpeechRecognition while recording; null when idle
function dumpView() {
  setHeader('Voice dump', { back: true });
  const supported = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
  $('main').innerHTML = `
    <p class="muted" style="margin:2px 4px 12px">Tap Record and ramble, or just type. Saved to your inbox for the assistant to sort into memory, tasks, and notes next session.</p>
    <textarea id="dumpta" placeholder="End-of-day thoughts, ideas, reminders&hellip;" style="height:46vh"></textarea>
    <div style="display:flex;gap:10px;margin-top:12px;align-items:center">
      <button class="ghost" id="dumprec" onclick="dumpRec()"${supported ? '' : ' disabled'}>&#127908; ${supported ? 'Record' : 'Voice unsupported'}</button>
      <span id="dumpdot" style="display:none;color:var(--danger);font-size:14px;animation:pulse 1.2s ease-in-out infinite">&#9679; listening&hellip;</span>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="primary" onclick="dumpSave()">Save to inbox</button>
      <button class="ghost" onclick="history.back()">Cancel</button>
    </div>`;
  const ta = $('dumpta');
  const dirty = () => ta.value.trim().length > 0;
  leaveGuard = { check: () => !dirty() || confirm('Discard this unsaved dump?'), dirty, hash: '#/dump' };
  viewCleanup = dumpStopRec;   // navigating away must stop the mic
}
function dumpRec() {
  if (dumpRecog) { dumpStopRec(); return; }                 // toggle off
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  const ta = $('dumpta');
  let base = ta.value.replace(/\s+$/, '');                  // committed text; interim is appended live
  if (base) base += ' ';
  const rec = new SR();
  rec.lang = 'en-US'; rec.continuous = true; rec.interimResults = true;
  let stopped = false;
  rec.onresult = e => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) base += t.trim() + ' '; else interim += t;
    }
    ta.value = base + interim; ta.scrollTop = ta.scrollHeight;
  };
  rec.onerror = ev => {
    if (ev.error === 'not-allowed' || ev.error === 'service-not-allowed') {
      stopped = true; toast('Mic blocked. Allow microphone access.');
    }
    // 'no-speech'/'aborted' just end the turn; onend restarts if still recording
  };
  rec.onend = () => {                                        // iOS ends on silence; restart so long rambles continue
    if (!stopped && dumpRecog === rec) { try { rec.start(); return; } catch (e) {} }
    if (dumpRecog === rec) dumpStopRec();
  };
  dumpRecog = rec;
  try { rec.start(); } catch (e) { dumpRecog = null; toast('Could not start mic.'); return; }
  $('dumprec').innerHTML = '&#9209;&#65039; Stop';
  $('dumpdot').style.display = 'inline';
}
function dumpStopRec() {
  const rec = dumpRecog; dumpRecog = null;
  if (rec) { try { rec.onend = null; rec.stop(); } catch (e) {} }
  const b = $('dumprec'); if (b) b.innerHTML = '&#127908; Record';
  const d = $('dumpdot'); if (d) d.style.display = 'none';
}
async function dumpSave() {
  const text = $('dumpta').value.trim();
  if (!text) { history.back(); return; }
  const d = new Date();
  const stamp = dkey(d) + '-' + pad(d.getHours()) + pad(d.getMinutes()) + pad(d.getSeconds());
  const body = '# Voice dump ' + dkey(d) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + '\n\n' + text + '\n';
  try {
    const sha = await saveFile('inbox/' + stamp + '.md', body, undefined, 'phone: voice dump');
    if (!sha) { toast('Try again.'); return; }
    leaveGuard = null; toast('Dumped to inbox'); location.hash = '';
  } catch (e) { toast('Save failed: ' + e.message); }
}

/* =============== Udemy script view =============== */
const WPM = 145;
const ANIM_RE = /^anim:\s?/, VIS_RE = /^(visual:|action:)/, RES_RE = /^resource:\s?/;
function uParse(text) {
  const lines = text.split('\n');
  const out = [];
  let c = { kind: 'prose', marker: null, lines: [] };
  const flush = () => { if (c.lines.length || c.kind === 'block') out.push(c); };
  for (const line of lines) {
    const m = line.match(/^\[(SLIDE|DEMO) [^\]]+\]\s*$/);
    const ends = /^(#{1,3} |---\s*$)/.test(line);
    if (m) { flush(); c = { kind: 'block', marker: line.trim(), lines: [] }; }
    else if (ends && c.kind === 'block') { flush(); c = { kind: 'prose', marker: null, lines: [line] }; }
    else c.lines.push(line);
  }
  flush();
  return out.map(s => {
    if (s.kind === 'prose') return { kind: 'prose', text: s.lines.join('\n') };
    const anim = s.lines.filter(l => ANIM_RE.test(l)).map(l => l.replace(ANIM_RE, ''));
    const res = s.lines.filter(l => RES_RE.test(l)).map(l => l.replace(RES_RE, ''));
    const vis = s.lines.filter(l => VIS_RE.test(l));
    const narr = s.lines.filter(l => !ANIM_RE.test(l) && !VIS_RE.test(l) && !RES_RE.test(l));
    while (narr.length && !narr[0].trim()) narr.shift();
    while (narr.length && !narr[narr.length - 1].trim()) narr.pop();
    return { kind: 'block', marker: s.marker, visual: vis.join('\n'), narr: narr.join('\n'), anim: anim.join('\n'), res: res.join('\n') };
  });
}
function uSerialize(segs) {
  return segs.map(s => {
    if (s.kind === 'prose') return s.text;
    const out = [s.marker];
    out.push(...s.visual.split('\n').filter(l => l.trim()));
    out.push(...s.anim.split('\n').filter(l => l.trim()).map(l => 'anim: ' + l.trim()));
    out.push(...(s.res || '').split('\n').filter(l => l.trim()).map(l => 'resource: ' + l.trim()));
    const narr = s.narr.replace(/\s+$/, '');
    if (narr.trim()) { out.push(''); out.push(...narr.split('\n')); }
    out.push('');
    return out.join('\n');
  }).join('\n');
}
function narrWords(t) { t = t.trim(); return t ? t.split(/\s+/).length : 0; }
function fmtDur(w) { const s = Math.round(w / WPM * 60); return Math.floor(s / 60) + ':' + pad(s % 60); }
function uPreview(seg, el) {
  const isDemo = seg.marker.startsWith('[DEMO');
  const vLines = seg.visual.split('\n').map(l => l.trim())
    .filter(l => VIS_RE.test(l)).map(l => l.replace(/^(visual:|action:)\s*/, ''));
  const inner = vLines.join(' ').split(/(?<=[.:]) /).map(t => '<div class="v-line">' + esc(t) + '</div>').join('');
  el.innerHTML = isDemo
    ? '<div class="screen"><div class="chrome"><i></i><i></i><i></i>&nbsp;screen recording</div><div class="body">' + inner + '</div></div>'
    : '<div class="board"><div class="b-kicker">sketch: dark canvas, hand-drawn</div>' + inner + '</div>';
}
async function udemyView(path) {
  if (cur.path !== path) cur = await loadFile(path);
  const name = path.split('/').pop().replace(/\.md$/, '');
  setHeader(name, { back: true, actions: [{ label: 'Raw', fn: () => {
    if (!uGuard()) return;
    leaveGuard = null; location.hash = '#/raw/' + encodeURIComponent(path);
  } }] });
  let segs = uParse(cur.text);
  let dirty = false;
  const draftKey = 'pa_draft_' + path;
  $('main').innerHTML = `
    <div id="ubanner"></div>
    <div class="u-tot" id="utot"></div>
    <div id="usegs"></div>
    <div class="savebar" id="usave" style="display:none">
      <span class="msg">Unsaved changes</span>

  const draft = localStorage.getItem(draftKey);

    $('ubanner').innerHTML = `<div class="banner">A draft from an earlier failed save exists on this device.

    $('drDiscard').onclick = () => { localStorage.removeItem(draftKey); $('ubanner').innerHTML = ''; };
  }
  function uGuard() { return !dirty || confirm('You have unsaved script edits. Leave and lose them?'); }
  leaveGuard = { check: uGuard, dirty: () => dirty, hash: '#/p/' + encodeURIComponent(path) };
  function markDirty() { dirty = true; $('usave').style.display = ''; }
  function totals() {

      card.innerHTML = `<div><span class="u-mark${isDemo ? ' demo' : ''}">${esc(seg.marker)}</span><span class="u-stats"></span></div>
        <div class="u-cols"><div class="u-left"><div class="uprev"></div></div><div class="u-right"></div></div>`;
      const prev = card.querySelector('.uprev');

      const refresh = () => {

        uPreview(seg, prev);
      };
      const mkField = (parent, lbl, cls, val, key, ph) => {
        const l = document.createElement('div'); l.className = 'u-lbl' + (key === 'anim' ? ' anim' : ''); l.textContent = lbl;

        ta.addEventListener('input', () => { seg[key] = ta.value; markDirty(); fit(ta); refresh(); if (key === 'narr') totals(); });
        parent.appendChild(l); parent.appendChild(ta);
        requestAnimationFrame(() => fit(ta));
      };
      mkField(left, isDemo ? 'Action (on screen)' : 'Visual (on the slide)', 'mono', seg.visual, 'visual',
        isDemo ? 'action: what happens on screen' : 'visual: what is drawn');
      mkField(left, 'Animation plan', '', seg.anim, 'anim', 'What draws in, keyed to the narration');
      mkField(left, 'Resources (for students)', 'mono', seg.res, 'res', 'One per line: file, link, or note to include with this lesson');
      mkField(rightCol, 'Narration (spoken + captions)', '', seg.narr, 'narr', 'What the voice says over this slide');
      root.appendChild(card);
      refresh();
    });

  }
  $('usavebtn').onclick = async () => {
    let text = uSerialize(segs);
    if (!text.endsWith('\n')) text += '\n';
    $('usavebtn').disabled = true;
    try {
      const sha = await saveFile(cur.path, text, cur.sha, 'phone: edit script ' + name);
      if (!sha) {
        localStorage.setItem(draftKey, text);
        cur = await loadFile(path);
        $('ubanner').innerHTML = `<div class="banner">The file changed elsewhere (probably Claude edited it), so your version was
          kept as a draft on this device instead of overwriting. Reloaded the latest file.
          <div class="brow"><button class="primary" onclick="location.reload()">OK</button></div></div>`;
        segs = uParse(cur.text); dirty = false; $('usave').style.display = 'none'; build();
        window.scrollTo(0, 0);
        return;
      }
      cur.text = text; cur.sha = sha; dirty = false;
      $('usave').style.display = 'none'; toast('Saved');
    } catch (e) { toast('Save failed: ' + e.message); }
    $('usavebtn').disabled = false;
  };
  $('udiscard').onclick = () => {

/* =============== concept map (Aegis, embedded) =============== */
/* The Aegis engine is loaded unchanged from the monorepo into a same-origin
   srcdoc iframe. PA Mobile owns all GitHub I/O: it injects the map, debounces
   commits of Jeremy's edits, and polls for the agent's drip-fed concepts. */
function blankMapObj(topic) {
  return { version: 1, meta: { topic, created: '', nudges: [] }, nodes: [], edges: [] };
}
/* Agent appends only unplaced tray nodes + nudges; Jeremy owns placements, edges,
   notes. On a conflict, keep everything of his and graft the agent's appends on.
   Only unplaced remote-only nodes are grafted: a placed node missing locally means
   Jeremy deleted it, so we must not resurrect it from the agent's older copy. */
function mergeMaps(remote, local) {
  const out = JSON.parse(JSON.stringify(local));
  const have = new Set(out.nodes.map(n => n.id));
  for (const n of (remote.nodes || [])) if (n.unplaced && !have.has(n.id)) out.nodes.push(n);
  const localDone = new Map((local.meta.nudges || []).map(g => [g.id, !!g.done]));
  const rn = (remote.meta && remote.meta.nudges) || [];
  out.meta.nudges = rn.map(g => ({ ...g, done: localDone.has(g.id) ? localDone.get(g.id) : !!g.done }));
  return out;
}
async function mapView(topic) {
  setHeader(topic.charAt(0).toUpperCase() + topic.slice(1) + ' map', { back: true });
  $('main').innerHTML = '<div class="mapview" id="mapwrap"><p class="muted" style="padding:20px">Loading map…</p></div>';
  const mapPath = 'learning/' + topic + '/map.json';
  const myHash = location.hash;
  let frame = null, commitTimer = null, pollTimer = null;
  let localDirty = false, committing = false, polling = false, gone = false, curSha;

  // Registered BEFORE the async loads so navigating away mid-load cancels this view
  // instead of letting a stale mapView() mutate the next route.
  viewCleanup = () => {
    gone = true; clearInterval(pollTimer); clearTimeout(commitTimer);
    // best-effort final flush of the latest live map (covers "edit then immediately leave")
    const cw = frame && frame.contentWindow;
    if (localDirty && cw && cw.aegis) {
      saveFile(mapPath, JSON.stringify(cw.aegis.getMap(), null, 2), curSha || undefined, 'aegis: map edit').catch(() => {});
    }
  };

  function scheduleCommit() { if (gone) return; localDirty = true; clearTimeout(commitTimer); commitTimer = setTimeout(doCommit, 1200); }
  // Serialized commit. Each attempt re-snapshots the LIVE map (Jeremy may edit during an
  // await) and clears localDirty at snapshot time, so an edit made after that re-sets the
  // flag and reschedules. On a conflict it merges the agent's file into the LIVE map, never
  // a stale copy, so no in-flight edit is dropped.
  async function doCommit() {
    if (!frame || gone) return;
    if (committing) { localDirty = true; return; }   // a commit is in flight; it picks up new edits
    const cw0 = frame.contentWindow; if (!cw0 || !cw0.aegis) return;
    committing = true; clearTimeout(commitTimer);
    try {
      for (let attempt = 0; attempt < 4; attempt++) {
        const cwa = frame && frame.contentWindow; if (!cwa || !cwa.aegis) break;
        localDirty = false;
        const localMap = cwa.aegis.getMap();
        let sha = null, err = null;
        try {
          sha = await saveFile(mapPath, JSON.stringify(localMap, null, 2), curSha || undefined,
                               attempt ? 'aegis: map edit (merged)' : 'aegis: map edit');
        } catch (e) { err = e; }
        if (sha) { curSha = sha; break; }            // saved (edits during the await left localDirty true)
        // 409 stale-sha update (sha null) or 422 concurrent-create (thrown): reconcile + retry.
        const remote = await loadFile(mapPath).catch(() => null);
        if (!remote) { if (err) { toast('Map save failed: ' + err.message); localDirty = true; } break; }
        curSha = remote.sha;
        const cw2 = frame && frame.contentWindow;
        const live = (cw2 && cw2.aegis) ? cw2.aegis.getMap() : localMap;   // keep edits made during the await
        const merged = mergeMaps(JSON.parse(remote.text), live);
        if (!gone && cw2 && cw2.aegis) cw2.aegis.loadMap(merged);
        toast("Merged Aegis's updates");
        if (attempt === 3) { localDirty = true; toast('Map is busy syncing; will retry on your next edit.'); }
      }
    } finally { committing = false; }
    if (localDirty && !gone) scheduleCommit();        // edits arrived mid-commit -> run again
  }
  async function pollRemote() {
    if (localDirty || committing || polling || gone) return;   // defer to any in-flight edit/commit/poll
    polling = true;
    try {
      const j = await ghGet(mapPath);
      if (localDirty || committing || gone) return;  // an edit or commit began while the GET was in flight
      if (!j || !j.sha || j.sha === curSha) return;
      const cw = frame && frame.contentWindow; if (!cw || !cw.aegis) return;
      const remote = JSON.parse(b64decode(j.content));
      const before = cw.aegis.getMap();
      const fresh = remote.nodes.filter(n => !before.nodes.some(o => o.id === n.id)).length;
      curSha = j.sha; cw.aegis.loadMap(remote);
      toast('Aegis updated the map' + (fresh ? ': ' + fresh + ' new concept' + (fresh > 1 ? 's' : '') : ''));
    } catch (e) { /* 404 (no file yet) or transient: ignore */ }
    finally { polling = false; }
  }

  let engineText, mapObj;
  try {
    const [eng, mp] = await Promise.all([
      loadFile('learning/aegis/index.html'),
      loadFile(mapPath).catch(() => null),          // no map yet -> start empty, first edit creates it
    ]);
    engineText = eng.text;
    if (mp) { mapObj = JSON.parse(mp.text); curSha = mp.sha; }
    else { mapObj = blankMapObj(topic); curSha = undefined; }
  } catch (e) {
    if (gone || location.hash !== myHash) return;
    const w = $('mapwrap'); if (w) w.innerHTML = `<p class="err" style="padding:20px">${esc(e.message)}</p>`;
    return;
  }
  if (gone || location.hash !== myHash) return;      // navigated away while loading

  const host = $('mapwrap'); if (!host) return; host.innerHTML = '';
  frame = document.createElement('iframe');
  frame.name = 'aegis-embed';                       // engine reads this to enter embed mode
  frame.title = topic + ' concept map';
  host.appendChild(frame);
  frame.onload = () => {
    if (gone) return;                                // torn down before the engine finished loading
    const cw = frame.contentWindow;
    if (!cw || !cw.aegis) { const h = $('mapwrap'); if (h) h.innerHTML = '<p class="err" style="padding:20px">Map engine failed to load.</p>'; return; }
    cw.aegis.loadMap(mapObj);
    cw.aegis.setOnChange(scheduleCommit);
    pollTimer = setInterval(pollRemote, 5000);
  };
  frame.srcdoc = engineText;
}

function gtokValid() { return DEMO || (gtok && Date.now() < gtok.exp); }
let tokenClient = null, afterAuth = null;
function gisReady() { return typeof google !== 'undefined' && google.accounts; }
/* MUST be called synchronously from a tap handler (iOS popup rule) */
function gAuth(after) {
  afterAuth = after || null;
  if (DEMO) { afterAuth && afterAuth(); return; }
  if (!gcid) { location.hash = '#/settings'; return; }
  if (!gisReady()) { toast('Google sign-in library still loading. Try again.'); return; }
  if (!tokenClient) {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: gcid, scope: GSCOPES, prompt: '',
      callback: resp => {
        if (resp.error) { toast('Google auth: ' + resp.error); return; }
        gtok = { t: resp.access_token, exp: Date.now() + (resp.expires_in - 60) * 1000 };
        localStorage.setItem('pa_gtok', JSON.stringify(gtok));
        const f = afterAuth; afterAuth = null; f && f();
      },
      error_callback: e => toast('Google sign-in did not open (' + (e.type || 'blocked') + '). Tap again.'),
    });
  }

}
async function gfetch(url, opts = {}) {
  if (!gtokValid()) throw new Error('Google not connected');
  opts.headers = Object.assign({ 'Authorization': 'Bearer ' + gtok.t }, opts.headers || {});
  if (opts.body) opts.headers['Content-Type'] = 'application/json';
  const r = await fetch(url, opts);
  if (r.status === 401 || r.status === 403) {
    gtok = null; localStorage.removeItem('pa_gtok');
    throw new Error('Google session expired');
  }
  if (!r.ok) throw new Error('Google API ' + r.status);
  return r.json();
}

let calCursor = null;   // Date at the first of the visible month
let calSel = null;      // 'YYYY-MM-DD' selected day
let calMap = {};        // dkey -> [events] for the visible window
function monthGridDays(cur) {
  const y = cur.getFullYear(), mo = cur.getMonth();
  const offset = new Date(y, mo, 1).getDay();              // 0 = Sunday
  const total = new Date(y, mo + 1, 0).getDate();
  const rows = Math.ceil((offset + total) / 7);            // 4-6 weeks, no empty trailing row
  const start = new Date(y, mo, 1 - offset);
  return Array.from({ length: rows * 7 }, (_, i) => { const d = new Date(start); d.setDate(start.getDate() + i); return d; });
}
function bucketEvents(evs) {
  const map = {};
  for (const ev of evs) {
    if (ev.start.dateTime) {
      const k = dkey(new Date(ev.start.dateTime));
      (map[k] = map[k] || []).push(ev);
    } else {                                                // all-day; end.date is exclusive
      const s = new Date(ev.start.date + 'T00:00:00');
      let e = ev.end && ev.end.date ? new Date(ev.end.date + 'T00:00:00') : new Date(s.getTime() + 864e5);
      if (e <= s) e = new Date(s.getTime() + 864e5);
      for (const d = new Date(s); d < e; d.setDate(d.getDate() + 1)) {
        const k = dkey(d); (map[k] = map[k] || []).push(ev);
      }
    }
  }
  return map;
}
function evStartMin(ev) {
  if (!ev.start.dateTime) return -1;                        // all-day sorts first
  const d = new Date(ev.start.dateTime); return d.getHours() * 60 + d.getMinutes();
}

function calShift(n) { calCursor = new Date(calCursor.getFullYear(), calCursor.getMonth() + n, 1); calView(); }
function wireSwipe(el) {
  let x0 = null, y0 = null;
  el.addEventListener('touchstart', e => { x0 = e.touches[0].clientX; y0 = e.touches[0].clientY; }, { passive: true });
  el.addEventListener('touchend', e => {
    if (x0 == null) return;
    const dx = e.changedTouches[0].clientX - x0, dy = e.changedTouches[0].clientY - y0;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.4) calShift(dx < 0 ? 1 : -1);
    x0 = y0 = null;
